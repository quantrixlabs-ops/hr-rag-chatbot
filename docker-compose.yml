version: "3.9"

services:
  api:
    build: ./backend
    working_dir: /app
    command: uvicorn backend.app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=development
      - LLM_PROVIDER=${LLM_PROVIDER:-ollama}
      - LLM_MODEL=${LLM_MODEL:-llama3:8b}
      - OLLAMA_BASE_URL=http://ollama:11434
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-nomic-embed-text}
      - EMBEDDING_PROVIDER=ollama
      - EMBEDDING_DIMENSION=768
      - VECTOR_STORE_BACKEND=faiss
      - FAISS_INDEX_DIR=/app/data/faiss_index
      - DB_PATH=/app/data/hr_chatbot.db
      - UPLOAD_DIR=/app/data/uploads
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-dev-secret-change-in-production}
      - COMPANY_NAME=${COMPANY_NAME:-Acme Corp}
      - HR_CONTACT_EMAIL=${HR_CONTACT_EMAIL:-hr@acmecorp.com}
    volumes:
      - backend_data:/app/data
      - ./backend:/app/backend
    depends_on:
      - ollama

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - api

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    deploy:
      resources:
        limits:
          cpus: "4"
          memory: 16G

volumes:
  backend_data:
  ollama_models:
