name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
    tags: ["v*.*.*"]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ── Lint ────────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install ruff
        run: pip install ruff==0.4.0

      - name: Lint backend
        run: ruff check backend/

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Lint frontend
        working-directory: frontend
        run: npm run lint

  # ── Unit Tests ───────────────────────────────────────────────────────────────
  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r backend/requirements.txt pytest pytest-asyncio

      - name: Run unit tests
        env:
          ENVIRONMENT: test
          DATABASE_URL: "sqlite:///./data/test.db"
          VECTOR_STORE_BACKEND: faiss
          REDIS_URL: "redis://localhost:6379/0"
          JWT_SECRET_KEY: test-secret-key-32-chars-minimum
        run: pytest backend/tests/unit/ -v --tb=short

  # ── Integration Tests ─────────────────────────────────────────────────────────
  test-integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: lint
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: hr_chatbot_test
          POSTGRES_USER: hr_user
          POSTGRES_PASSWORD: test_password
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r backend/requirements.txt pytest pytest-asyncio httpx

      - name: Run integration tests
        env:
          ENVIRONMENT: test
          DATABASE_URL: "postgresql://hr_user:test_password@localhost:5432/hr_chatbot_test"
          VECTOR_STORE_BACKEND: faiss
          REDIS_URL: "redis://localhost:6379/0"
          JWT_SECRET_KEY: test-secret-key-32-chars-minimum-here
        run: pytest backend/tests/integration/ -v --tb=short

  # ── Docker Build ─────────────────────────────────────────────────────────────
  build:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: [test-unit, test-integration]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Deploy to Staging ────────────────────────────────────────────────────────
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: staging
      url: https://staging.hr-chatbot.example.com
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to staging
        env:
          IMAGE_TAG: sha-${{ github.sha }}
        run: |
          echo "Deploying $IMAGE_TAG to staging"
          # SSH to staging host and pull new image, or:
          # kubectl set image deployment/api api=$REGISTRY/$IMAGE_NAME:$IMAGE_TAG -n staging

  # ── Smoke Tests ─────────────────────────────────────────────────────────────
  smoke-tests:
    name: Smoke Tests
    runs-on: ubuntu-latest
    needs: deploy-staging
    steps:
      - name: Health check
        env:
          STAGING_URL: ${{ secrets.STAGING_URL }}
        run: |
          curl -sf "${STAGING_URL:-http://localhost:8000}/health" \
            | python3 -c "import sys,json; d=json.load(sys.stdin); assert d['status']=='ok'"
          echo "Health check passed"

  # ── Production Deploy (tagged releases only) ─────────────────────────────────
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: smoke-tests
    if: startsWith(github.ref, 'refs/tags/v')
    environment:
      name: production
      url: https://hr-chatbot.example.com
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to production
        env:
          IMAGE_TAG: ${{ github.ref_name }}
        run: |
          echo "Deploying $IMAGE_TAG to production"
          # kubectl set image deployment/api api=$REGISTRY/$IMAGE_NAME:$IMAGE_TAG -n production
