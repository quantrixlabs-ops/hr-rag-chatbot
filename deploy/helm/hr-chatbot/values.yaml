replicaCount: 2

image:
  backend:
    repository: hr-chatbot-backend
    tag: "1.0.0"
    pullPolicy: IfNotPresent
  frontend:
    repository: hr-chatbot-frontend
    tag: "1.0.0"
    pullPolicy: IfNotPresent

backend:
  port: 8000

frontend:
  port: 3000

ollama:
  enabled: true
  model: "llama3:8b"
  host: "http://ollama:11434"

resources:
  backend:
    limits:
      cpu: "1"
      memory: "1Gi"
    requests:
      cpu: "250m"
      memory: "512Mi"
  frontend:
    limits:
      cpu: "500m"
      memory: "512Mi"
    requests:
      cpu: "100m"
      memory: "128Mi"
  ollama:
    limits:
      cpu: "4"
      memory: "8Gi"
    requests:
      cpu: "2"
      memory: "4Gi"

env:
  JWT_SECRET_KEY: "change-me-in-production"
  ENVIRONMENT: "production"
  CORS_ORIGINS: "*"

persistence:
  enabled: true
  storageClass: ""
  accessMode: ReadWriteOnce
  size: 5Gi

ingress:
  enabled: false
  className: nginx
  host: hr-chatbot.example.com
  tls:
    enabled: false
    secretName: hr-chatbot-tls
