apiVersion: v1
kind: Service
metadata:
  name: {{ include "hr-chatbot.fullname" . }}-backend
  labels:
    app.kubernetes.io/name: {{ include "hr-chatbot.name" . }}
    app.kubernetes.io/component: backend
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.backend.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: {{ include "hr-chatbot.name" . }}
    app.kubernetes.io/component: backend
