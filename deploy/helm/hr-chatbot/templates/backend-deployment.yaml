apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "hr-chatbot.fullname" . }}-backend
  labels:
    app.kubernetes.io/name: {{ include "hr-chatbot.name" . }}
    app.kubernetes.io/component: backend
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "hr-chatbot.name" . }}
      app.kubernetes.io/component: backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "hr-chatbot.name" . }}
        app.kubernetes.io/component: backend
    spec:
      containers:
        - name: backend
          image: "{{ .Values.image.backend.repository }}:{{ .Values.image.backend.tag }}"
          imagePullPolicy: {{ .Values.image.backend.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.backend.port }}
              protocol: TCP
          env:
            - name: JWT_SECRET_KEY
              value: {{ .Values.env.JWT_SECRET_KEY | quote }}
            - name: ENVIRONMENT
              value: {{ .Values.env.ENVIRONMENT | quote }}
            - name: CORS_ORIGINS
              value: {{ .Values.env.CORS_ORIGINS | quote }}
            {{- if .Values.ollama.enabled }}
            - name: OLLAMA_HOST
              value: {{ .Values.ollama.host | quote }}
            - name: OLLAMA_MODEL
              value: {{ .Values.ollama.model | quote }}
            {{- end }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            {{- toYaml .Values.resources.backend | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /app/data
      volumes:
        - name: data
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "hr-chatbot.fullname" . }}-data
          {{- else }}
          emptyDir: {}
          {{- end }}
