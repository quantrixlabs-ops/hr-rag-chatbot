apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-secrets
  annotations:
    helm.sh/resource-policy: keep  # Don't delete secrets on helm uninstall
type: Opaque
stringData:
  jwt-secret-key: {{ .Values.secrets.jwtSecretKey | quote }}
  encryption-key: {{ .Values.secrets.encryptionKey | quote }}
  audit-sign-secret: {{ .Values.secrets.auditSignSecret | quote }}
  hash-pepper: {{ .Values.secrets.hashPepper | quote }}
